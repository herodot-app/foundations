tasks:
  test:
    command: 'bun test'
    deps:
      - 'idion:build'
      - 'zygon:build'
      - 'sema:build'
      - 'rheon:build'
      - 'ptoma:build'
      - 'agora:build'
  lint:
    command: 'biome check'
    deps:
      - 'idion:build'
      - 'zygon:build'
      - 'sema:build'
      - 'rheon:build'
      - 'ptoma:build'
      - 'agora:build'
  build:
    command: 'bun run dist'
    deps:
      - 'idion:build'
      - 'zygon:build'
      - 'sema:build'
      - 'rheon:build'
      - 'ptoma:build'
      - 'agora:build'
